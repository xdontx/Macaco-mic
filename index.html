<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Macaco Mic</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-strong: #0ea5e9;
            --border: rgba(148, 163, 184, 0.16);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            min-height: 100%;
        }

        body {
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 35%),
                        linear-gradient(180deg, #0b1220 0%, #0d1117 100%);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 32px;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: -0.04em;
        }

        .card {
            width: min(520px, 100%);
            background: rgba(16, 23, 34, 0.94);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: var(--shadow);
            padding: 32px;
            backdrop-filter: blur(18px);
        }

        .controls {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 24px;
        }

        button {
            appearance: none;
            border: none;
            border-radius: 999px;
            padding: 16px 28px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
            box-shadow: 0 16px 30px rgba(15, 23, 42, 0.24);
            min-width: 140px;
        }

        .small-text {
            color: var(--text-secondary);
            text-align: center;
            margin-top: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        @media (max-width: 520px) {
            body {
                padding: 20px;
            }

            .card {
                padding: 24px;
                border-radius: 24px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .controls {
                gap: 12px;
                margin-top: 20px;
            }

            button {
                width: 100%;
                min-width: unset;
                padding: 14px 20px;
            }

            .small-text {
                font-size: 0.9rem;
            }
        }

        button#start {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #0f172a;
        }

        button#stop {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .small-text {
            color: var(--text-secondary);
            text-align: center;
            margin-top: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎙️ Micrófono Macaco</h1>

    <div class="controls">
        <button id="start">Grabar</button>
        <button id="stop">Detener</button>
    </div>

    <p class="small-text">Presiona grabar y detén cuando quieras. Funciona muy bien en celular.</p>
</div>

<script>
let recorder;
let chunks = [];

alert("mediaDevices = " + navigator.mediaDevices);

document.getElementById("start").onclick = async () => {
    alert("Botón presionado");

    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: true
        });

        alert("🎤 Micrófono obtenido correctamente");
    }
    catch(err) {
        alert("❌ Error: " + err.message);
    }
};

document.getElementById("stop").onclick = () => {
    recorder.stop();

    recorder.onstop = () => {
        const blob = new Blob(chunks, {
            type: "audio/webm"
        });

        console.log(blob);

        chunks = [];
    };
};
</script>

</body>
</html>
